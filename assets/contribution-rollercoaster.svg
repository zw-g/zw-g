<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <style>
    /* ── Stars ── */
    @keyframes twinkle {
      0%, 100% { opacity: 0.08; }
      50% { opacity: 0.55; }
    }
    .star { animation: twinkle 3s ease-in-out infinite; }

    /* ── Spaceship bob ── */
    @keyframes bob {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    .spaceship { animation: bob 2.8s ease-in-out infinite; }

    /* ── Green glow pulse ── */
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.12; }
      50% { opacity: 0.3; }
    }
    .glow { animation: glow-pulse 2s ease-in-out infinite; }

    /* ── Speed lines ── */
    @keyframes dash {
      0% { opacity: 0.5; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(-8px); }
    }
    .speed-line {
      stroke-linecap: round;
      animation: dash 1.2s linear infinite;
    }

    /* ── Line draw ── */
    @keyframes draw-line {
      to { stroke-dashoffset: 0; }
    }
    .chart-line {
      stroke-dasharray: 2200;
      stroke-dashoffset: 2200;
      animation: draw-line 2.5s ease-out forwards;
    }

    /* ── Area fade in ── */
    @keyframes fade-area {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    .chart-area {
      opacity: 0;
      animation: fade-area 1s ease-out 1.8s forwards;
    }
  </style>

  <defs>
    <!-- Area gradient -->
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90EE90" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#90EE90" stop-opacity="0.02"/>
    </linearGradient>
    <!-- UFO body metallic gradient -->
    <linearGradient id="ufoBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/>
      <stop offset="40%" stop-color="#B0B0B0"/>
      <stop offset="100%" stop-color="#707070"/>
    </linearGradient>
    <!-- Dome glass gradient -->
    <radialGradient id="dome" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#90EE90" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#90EE90" stop-opacity="0.08"/>
    </radialGradient>
  </defs>


<svg xmlns="http://www.w3.org/2000/svg" width="420" height="120" viewBox="0 0 420 120" role="img" aria-label="Recently liked song: 雨蝶 (R&amp;B微醺版) by Release">
  <defs>
    <clipPath id="artClip">
      <rect x="15" y="15" width="90" height="90" rx="12"/>
    </clipPath>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="artShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <style>
    /* Star twinkle */
    @keyframes tw {
      0%, 100% { opacity: .12 }
      50% { opacity: .8 }
    }
    /* Equalizer bars — tall, varied */
    @keyframes eq1 {
      0%, 100% { height: 8px; y: 97px; }
      50% { height: 26px; y: 79px; }
    }
    @keyframes eq2 {
      0%, 100% { height: 22px; y: 83px; }
      50% { height: 10px; y: 95px; }
    }
    @keyframes eq3 {
      0%, 100% { height: 6px; y: 99px; }
      50% { height: 24px; y: 81px; }
    }
    @keyframes eq4 {
      0%, 100% { height: 18px; y: 87px; }
      50% { height: 8px; y: 97px; }
    }
    @keyframes eq5 {
      0%, 100% { height: 10px; y: 95px; }
      50% { height: 22px; y: 83px; }
    }
    /* Label pulse */
    @keyframes pulse {
      0%, 100% { opacity: .7 }
      50% { opacity: 1 }
    }
    .s { fill: #FFD700 }
    .s1 { animation: tw 3s ease-in-out infinite }
    .s2 { animation: tw 3s ease-in-out .6s infinite }
    .s3 { animation: tw 2.8s ease-in-out 1.3s infinite }
    .s4 { animation: tw 3.5s ease-in-out 2s infinite }
    .s5 { animation: tw 2.5s ease-in-out .3s infinite }
    .s6 { animation: tw 3.2s ease-in-out 1.7s infinite }
    .s7 { animation: tw 2.6s ease-in-out 2.4s infinite }
    .eq { fill: #90EE90; rx: 1.5; }
    .e1 { animation: eq1 1.1s ease-in-out infinite; }
    .e2 { animation: eq2 0.9s ease-in-out infinite .15s; }
    .e3 { animation: eq3 1.0s ease-in-out infinite .3s; }
    .e4 { animation: eq4 0.85s ease-in-out infinite .05s; }
    .e5 { animation: eq5 1.05s ease-in-out infinite .25s; }
    .lbl { animation: pulse 3s ease-in-out infinite; }
  </style>

  <!-- Background with gradient -->
  <rect width="420" height="120" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle mint border/glow -->
  <rect width="420" height="120" rx="16" fill="none" stroke="rgba(144,238,144,0.3)" stroke-width="1"/>
  <rect x="1" y="1" width="418" height="118" rx="15" fill="none" stroke="rgba(144,238,144,0.08)" stroke-width="0.5"/>

  <!-- Stars — tiny, subtle, scattered -->
  <circle class="s s1" cx="14" cy="12" r="1"/>
  <circle class="s s2" cx="55" cy="7" r=".7"/>
  <circle class="s s3" cx="140" cy="10" r=".9"/>
  <circle class="s s4" cx="220" cy="5" r="1"/>
  <circle class="s s5" cx="300" cy="12" r=".8"/>
  <circle class="s s6" cx="355" cy="7" r="1"/>
  <circle class="s s7" cx="405" cy="14" r=".7"/>
  <circle class="s s1" cx="380" cy="110" r=".8"/>
  <circle class="s s3" cx="35" cy="112" r=".7"/>
  <circle class="s s5" cx="185" cy="113" r=".6"/>
  <circle class="s s2" cx="325" cy="108" r=".7"/>
  <circle class="s s4" cx="90" cy="5" r=".5"/>
  <circle class="s s6" cx="260" cy="9" r=".6"/>

  <!-- Album art with shadow and rounded clip -->
  <g filter="url(#artShadow)">
    <image x="15" y="15" width="90" height="90" href="data:image/jpeg;base64," clip-path="url(#artClip)" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <!-- Right side content -->
  <!-- "Recently Liked" label -->
  <text class="lbl" x="120" y="36" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="11" fill="#FFD700" font-weight="600">🎵 Recently Liked</text>

  <!-- Song title -->
  <text x="120" y="58" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" fill="#FFFFFF" font-weight="700">雨蝶 (R&amp;B微醺版)</text>

  <!-- Artist name -->
  <text x="120" y="78" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="13" fill="#90EE90" font-weight="500">Release</text>

  <!-- Equalizer bars — prominent, animated -->
  <rect class="eq e1" x="120" y="97" width="4" height="8" opacity=".85"/>
  <rect class="eq e2" x="128" y="83" width="4" height="22" opacity=".85"/>
  <rect class="eq e3" x="136" y="99" width="4" height="6" opacity=".85"/>
  <rect class="eq e4" x="144" y="87" width="4" height="18" opacity=".85"/>
  <rect class="eq e5" x="152" y="95" width="4" height="10" opacity=".85"/>

</svg>